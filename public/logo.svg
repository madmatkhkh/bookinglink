<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    لوگوی نوبت‌لینک — بازسازی وکتوری طرح ارائه‌شده (تقویم + حلقه‌ی لینک).
    تک‌رنگ (currentColor) تا هم روی زمینه‌ی روشن هم تیره درست باشد.
    حلقه‌ی لینک با «هاله‌ی سفید» (استروک پهن‌تر با رنگ زمینه) از بدنه‌ی تقویم
    جدا شده — همان افکت طرح اصلی. paper رنگ صفحه‌ی تقویم و هاله است.
  -->
  <g>
    <!-- بدنه‌ی تقویم -->
    <rect x="92" y="104" width="328" height="332" rx="54" fill="currentColor"/>
    <!-- صفحه‌ی سفید تقویم (زیر نوار سربرگ) -->
    <rect x="128" y="184" width="256" height="216" rx="26" fill="var(--logo-paper, #ffffff)"/>
    <!-- حلقه‌های کلاسور -->
    <rect x="146" y="52" width="52" height="118" rx="26" fill="currentColor" stroke="var(--logo-paper, #ffffff)" stroke-width="16"/>
    <rect x="314" y="52" width="52" height="118" rx="26" fill="currentColor" stroke="var(--logo-paper, #ffffff)" stroke-width="16"/>
    <!-- خانه‌های تاریخ (خانه‌های سمت لینک عمدا حذف‌اند) -->
    <g fill="currentColor">
      <rect x="156" y="208" width="38" height="38" rx="9"/>
      <rect x="220" y="208" width="38" height="38" rx="9"/>
      <rect x="284" y="208" width="38" height="38" rx="9"/>
      <rect x="156" y="272" width="38" height="38" rx="9"/>
      <rect x="220" y="272" width="38" height="38" rx="9"/>
      <rect x="156" y="336" width="38" height="38" rx="9"/>
    </g>
    <!-- حلقه‌ی لینک — اول هاله‌ی سفید (جداکننده از تقویم)، بعد خود لینک -->
    <g transform="translate(242 250) scale(9.2)" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <g stroke="var(--logo-paper, #ffffff)" stroke-width="5">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </g>
      <g stroke="currentColor" stroke-width="2.4">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </g>
    </g>
  </g>
</svg>
