.site-icon {
  width: 100px;         /* سایز آیکون را اینجا بزرگتر یا کوچکتر کنید */
  height: 100px;
  background-color: #f0f0f0; /* رنگ پس‌زمینه دایره */
  border-radius: 50%;   /* تبدیل کردن قاب به دایره کامل */
  padding: 15px;        /* فاصله گرفتن آیکون از لبه‌های دایره */
  box-sizing: border-box;
}