<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 15 70 70">
  <!-- فاوآیکن نوبت‌لینک — همان نشان رسمی، ولی روی پس‌زمینه‌ی سفیدِ گوشه‌گرد.
       دلیل: نشان طوری طراحی شده که نوک میله عمدا از کاشی بیرون می‌زند و روی
       سفید پنهان می‌ماند؛ با پس‌زمینه‌ی شفاف آن نوک‌ها لو می‌روند و فاوآیکن
       ناخوانا/غلط دیده می‌شود. هندسه‌ی خود نشان دقیقا مثل public/logo.svg است
       و آن فایل (لوگوی هدر سایت) دست‌نخورده باقی می‌ماند. -->
  <rect x="15" y="15" width="70" height="70" rx="15.4" fill="#ffffff"/>
  <rect x="20" y="20" width="60" height="60" rx="20" fill="#0a0a0a"/>
  <rect x="44" y="15" width="12" height="70" rx="6" fill="#ffffff" transform="rotate(45 50 50)"/>
  <circle cx="50" cy="50" r="14" fill="#ffffff"/>
  <circle cx="50" cy="50" r="6" fill="#0a0a0a"/>
</svg>
